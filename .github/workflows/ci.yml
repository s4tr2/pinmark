name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Dummy values: builds must succeed without real infrastructure.
      # Anything needing live services degrades gracefully by design.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_CDN_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Required documentation exists
        run: |
          for f in README.md DEPLOY.md SECURITY.md CONTRIBUTING.md .env.example ARCHITECTURE.md; do
            test -f "$f" || { echo "Missing required file: $f"; exit 1; }
          done

      - name: No em dashes in docs or source
        run: |
          if git ls-files '*.md' '*.ts' '*.tsx' | xargs grep -lP '\x{2014}'; then
            echo "Em dashes found in the files above. Use commas, colons, or periods instead."
            exit 1
          fi

      - name: Migrations are ordered and well-named
        run: node scripts/check-migrations.mjs

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build widget (hard bundle-size gate)
        run: pnpm --filter widget build

      - name: Build web (hosted mode)
        run: pnpm --filter web build

      - name: No server secrets in client bundle
        run: |
          if grep -r "$SUPABASE_SERVICE_ROLE_KEY" apps/web/.next/static 2>/dev/null; then
            echo "Service-role key value leaked into the client bundle."
            exit 1
          fi

      - name: Build web (self-hosted mode)
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SELF_HOSTED: "true"

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm e2e
