name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Dummy values: builds must succeed without real infrastructure.
      # Anything needing live services degrades gracefully by design.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-dummy-service-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_CDN_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build widget (hard bundle-size gate)
        run: pnpm --filter widget build

      - name: Build web
        run: pnpm --filter web build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm e2e
